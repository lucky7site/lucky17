<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky 7 – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--gold:#ffd700;--red:#ff4466;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(180,79,255,0.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 10% 90%,rgba(0,255,136,0.1) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 90% 80%,rgba(0,200,255,0.08) 0%,transparent 60%);pointer-events:none;}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.p{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-20vh) scale(1);opacity:0}}
.wrap{position:relative;z-index:1;width:90%;max-width:400px;padding:20px 0;}
.logo-area{text-align:center;margin-bottom:28px;}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:38px;background:linear-gradient(90deg,var(--green),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:shift 3s linear infinite;letter-spacing:4px;}
@keyframes shift{0%{background-position:0%}100%{background-position:200%}}
.logo span{-webkit-text-fill-color:var(--gold);filter:drop-shadow(0 0 12px var(--gold));}
.logo-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:2px;text-transform:uppercase;}
.auth-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(180,79,255,0.08);}
.auth-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:14px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:10px;text-align:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:10px;transition:.2s;color:var(--muted);}
.auth-tab.active{background:linear-gradient(135deg,rgba(180,79,255,0.25),rgba(0,200,255,0.15));color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:13px;padding:13px 16px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(180,79,255,0.1);}
.form-input.error{border-color:var(--red);}
.form-input.valid{border-color:var(--green);}
.phone-wrap{display:flex;gap:8px;}
.prefix{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:13px;padding:13px 14px;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;display:flex;align-items:center;}
.field-error{font-size:11px;color:var(--red);margin-top:5px;display:none;}
.field-error.show{display:block;}
.field-hint{font-size:11px;color:var(--muted);margin-top:5px;}
.submit-btn{width:100%;border:none;border-radius:14px;padding:15px;margin-top:8px;background:linear-gradient(90deg,var(--purple),var(--blue));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:2px;transition:.2s;box-shadow:0 0 20px rgba(180,79,255,0.3);}
.submit-btn:active{transform:scale(0.97);}
.submit-btn:disabled{opacity:0.5;pointer-events:none;}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.97);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--blue);color:var(--blue);}
.pwd-strength{margin-top:6px;height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;}
.pwd-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0%;}
.input-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--muted);white-space:nowrap;}
.welcome-back{text-align:center;margin-bottom:14px;}
.wb-text{font-size:13px;color:var(--muted);}
.wb-name{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--green);margin-top:4px;}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top:3px solid var(--purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Connecting to Lucky 7...</p>
</div>

<div class="particles" id="particles"></div>

<div class="wrap">
  <div class="logo-area">
    <div class="logo">Lucky<span>7</span></div>
    <div class="logo-sub">Premium Gaming Platform</div>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">🔑 LOGIN</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">✨ REGISTER</div>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div id="welcomeBack" class="welcome-back" style="display:none;">
        <div class="wb-text">Welcome back,</div>
        <div class="wb-name" id="wbName"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="loginUser" placeholder="Enter your username">
        <div class="field-error" id="loginUserErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="loginPass" placeholder="Enter your password">
          <button class="eye-btn" onclick="toggleEye('loginPass',this)">👁</button>
        </div>
        <div class="field-error" id="loginPassErr"></div>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">LOGIN →</button>
      <div class="divider"><span>Don't have an account?</span></div>
      <div style="text-align:center;cursor:pointer;color:var(--blue);font-weight:700;font-size:14px;" onclick="switchTab('register')">Create Account ✨</div>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none;">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="regUser" placeholder="Choose a unique username" oninput="checkUsernameAvail(this.value)">
        <div class="field-error" id="regUserErr"></div>
        <div class="field-hint" id="regUserHint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="phone-wrap">
          <div class="prefix">🇮🇳 +91</div>
          <input type="tel" class="form-input" id="regPhone" placeholder="10-digit mobile" maxlength="10" oninput="validatePhone(this)">
        </div>
        <div class="field-error" id="regPhoneErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="regPass" placeholder="Min 6 characters" oninput="checkStrength(this.value)">
          <button class="eye-btn" onclick="toggleEye('regPass',this)">👁</button>
        </div>
        <div class="pwd-strength"><div class="pwd-fill" id="pwdFill"></div></div>
        <div class="field-error" id="regPassErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="regPass2" placeholder="Repeat password">
          <button class="eye-btn" onclick="toggleEye('regPass2',this)">👁</button>
        </div>
        <div class="field-error" id="regPass2Err"></div>
      </div>
      <button class="submit-btn" id="regBtn" onclick="doRegister()">CREATE ACCOUNT →</button>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:14px;">18+ only. By registering you agree to our Terms.</div>
      <div class="divider"><span>Already have an account?</span></div>
      <div style="text-align:center;cursor:pointer;color:var(--blue);font-weight:700;font-size:14px;" onclick="switchTab('login')">Login →</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- =====================================================
     FIREBASE COMPAT SDK (works with regular onclick attrs)
     ===================================================== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

// ╚══════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyClNX5DPD55Lhj_N-UwfWtD5VssOZQZ9qw",
  authDomain: "lucky7-64a59.firebaseapp.com",
  projectId: "lucky7-64a59",
  storageBucket: "lucky7-64a59.firebasestorage.app",
  messagingSenderId: "950599334529",
  appId: "1:950599334529:web:ca04176afa45a923532b80",
  measurementId: "G-PFKHB9ED9W"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// Hide loading screen
document.getElementById('loadingScreen').style.display = 'none';

// ── Particles ─────────────────────────────────────────
(function(){
  var pc = document.getElementById('particles');
  var colors = ['#00ff88','#b44fff','#00c8ff','#ffd700'];
  for(var i=0;i<20;i++){
    var p=document.createElement('div'); p.className='p';
    var sz=Math.random()*4+2;
    p.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;background:'+colors[Math.floor(Math.random()*4)]+';animation-duration:'+(6+Math.random()*8)+'s;animation-delay:'+(Math.random()*6)+'s;';
    pc.appendChild(p);
  }
})();

// ── Auto-login if session exists ──────────────────────
(function(){
  var sess = localStorage.getItem('l7_current_user');
  if(!sess) return;
  try {
    var u = JSON.parse(sess);
    // Verify user still exists in Firestore
    db.collection('users').doc(u.id).get().then(function(snap){
      if(snap.exists){
        // Update balance from Firestore
        var data = snap.data();
        localStorage.setItem('l7_balance', String(data.wallet || 0));
        // Update lastLogin
        db.collection('users').doc(u.id).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
        location.replace('index.html');
      } else {
        localStorage.removeItem('l7_current_user');
      }
    }).catch(function(){ /* network error, stay on page */ });
  } catch(e){ localStorage.removeItem('l7_current_user'); }
})();

// Show welcome back
(function(){
  var ls = localStorage.getItem('l7_current_user');
  if(!ls) return;
  try {
    var u = JSON.parse(ls);
    document.getElementById('wbName').textContent = u.username;
    document.getElementById('welcomeBack').style.display = 'block';
    document.getElementById('loginUser').value = u.username;
  } catch(e){}
})();

// ── Helpers ───────────────────────────────────────────
function showErr(id, msg){ var e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function clearErr(id){ var e=document.getElementById(id); e.classList.remove('show'); e.textContent=''; }
function clearAll(){
  ['loginUserErr','loginPassErr','regUserErr','regPhoneErr','regPassErr','regPass2Err'].forEach(clearErr);
  document.querySelectorAll('.form-input').forEach(function(i){ i.classList.remove('error','valid'); });
}
function showToast(msg, type){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(function(){ t.className='toast'; }, 3000);
}

function switchTab(tab){
  document.getElementById('form-login').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  clearAll();
}
function toggleEye(id, btn){
  var inp = document.getElementById(id);
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}
function validatePhone(inp){
  var val = inp.value.replace(/\D/g,''); inp.value=val;
  var ok = /^[6-9]\d{9}$/.test(val);
  if(val.length===10){
    inp.classList.toggle('valid',ok); inp.classList.toggle('error',!ok);
    ok ? clearErr('regPhoneErr') : showErr('regPhoneErr','Valid Indian mobile required (starts 6-9)');
  } else { inp.classList.remove('valid','error'); clearErr('regPhoneErr'); }
}
function checkStrength(val){
  var fill = document.getElementById('pwdFill');
  var s=0;
  if(val.length>=6)s++; if(val.length>=10)s++;
  if(/[A-Z]/.test(val))s++; if(/[0-9]/.test(val))s++; if(/[^a-zA-Z0-9]/.test(val))s++;
  fill.style.width = (s/5*100)+'%';
  fill.style.background = ['#ff4466','#ff8c00','#ffd700','#00c8ff','#00ff88'][Math.max(0,s-1)];
}

// Username availability check
var uTimer = null;
function checkUsernameAvail(val){
  clearTimeout(uTimer);
  var hint=document.getElementById('regUserHint');
  var inp=document.getElementById('regUser');
  clearErr('regUserErr'); inp.classList.remove('valid','error');
  if(!val||val.length<3){ hint.textContent=''; return; }
  if(!/^[a-zA-Z0-9_]+$/.test(val)){
    showErr('regUserErr','Only letters, numbers, underscores');
    inp.classList.add('error'); hint.textContent=''; return;
  }
  hint.textContent='Checking...';
  uTimer = setTimeout(function(){
    db.collection('users').where('usernameLower','==',val.toLowerCase()).get()
      .then(function(s){
        if(!s.empty){
          inp.classList.add('error'); inp.classList.remove('valid');
          showErr('regUserErr','Username already taken'); hint.textContent='';
        } else {
          inp.classList.add('valid'); inp.classList.remove('error');
          hint.textContent='✅ Username available!'; hint.style.color='var(--green)';
          clearErr('regUserErr');
        }
      }).catch(function(){ hint.textContent=''; });
  }, 600);
}

// ── REGISTER ──────────────────────────────────────────
function doRegister(){
  clearAll();
  var username = document.getElementById('regUser').value.trim();
  var phone    = document.getElementById('regPhone').value.trim();
  var pass     = document.getElementById('regPass').value;
  var pass2    = document.getElementById('regPass2').value;
  var valid    = true;

  if(!username||username.length<3){ showErr('regUserErr','Min 3 characters'); document.getElementById('regUser').classList.add('error'); valid=false; }
  else if(!/^[a-zA-Z0-9_]+$/.test(username)){ showErr('regUserErr','Letters, numbers, underscores only'); document.getElementById('regUser').classList.add('error'); valid=false; }
  if(!/^[6-9]\d{9}$/.test(phone)){ showErr('regPhoneErr','Valid 10-digit Indian mobile required'); document.getElementById('regPhone').classList.add('error'); valid=false; }
  if(pass.length<6){ showErr('regPassErr','Min 6 characters'); document.getElementById('regPass').classList.add('error'); valid=false; }
  if(pass!==pass2){ showErr('regPass2Err','Passwords do not match'); document.getElementById('regPass2').classList.add('error'); valid=false; }
  if(!valid) return;

  var btn = document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='Creating account...';

  // Check duplicate username
  db.collection('users').where('usernameLower','==',username.toLowerCase()).get()
    .then(function(uSnap){
      if(!uSnap.empty){
        showErr('regUserErr','Username already taken');
        document.getElementById('regUser').classList.add('error');
        btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
        return;
      }
      // Check duplicate phone
      return db.collection('users').where('phone','==',phone).get()
        .then(function(pSnap){
          if(!pSnap.empty){
            showErr('regPhoneErr','Phone already registered');
            document.getElementById('regPhone').classList.add('error');
            btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
            return;
          }
          // Create user document
          var userId = 'u'+Date.now();
          return db.collection('users').doc(userId).set({
            id:            userId,
            username:      username,
            usernameLower: username.toLowerCase(),
            phone:         phone,
            password:      btoa(pass),
            wallet:        10,
            createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
            lastLogin:     firebase.firestore.FieldValue.serverTimestamp(),
            joinDate:      new Date().toLocaleDateString()
          }).then(function(){
            localStorage.setItem('l7_current_user', JSON.stringify({id:userId, username:username, phone:phone}));
            localStorage.setItem('l7_balance','10');
            showToast('🎉 Account created! Welcome bonus: 10 coins!','ok');
            setTimeout(function(){ location.href='index.html'; }, 1500);
          });
        });
    }).catch(function(e){
      showToast('Error: '+e.message,'err');
      btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
    });
}

// ── LOGIN ─────────────────────────────────────────────
function doLogin(){
  clearAll();
  var username = document.getElementById('loginUser').value.trim();
  var pass     = document.getElementById('loginPass').value;
  if(!username){ showErr('loginUserErr','Enter username'); document.getElementById('loginUser').classList.add('error'); return; }
  if(!pass){     showErr('loginPassErr','Enter password'); document.getElementById('loginPass').classList.add('error'); return; }

  var btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Logging in...';

  db.collection('users').where('usernameLower','==',username.toLowerCase()).get()
    .then(function(snap){
      if(snap.empty){
        showErr('loginUserErr','Wrong username or password');
        document.getElementById('loginUser').classList.add('error');
        showToast('❌ Wrong credentials','err');
        btn.disabled=false; btn.textContent='LOGIN →'; return;
      }
      var userDoc = snap.docs[0];
      var data    = userDoc.data();
      if(data.password !== btoa(pass)){
        showErr('loginPassErr','Wrong username or password');
        document.getElementById('loginPass').classList.add('error');
        showToast('❌ Wrong credentials','err');
        btn.disabled=false; btn.textContent='LOGIN →'; return;
      }
      // Update lastLogin
      db.collection('users').doc(userDoc.id).update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
      localStorage.setItem('l7_current_user', JSON.stringify({id:userDoc.id, username:data.username, phone:data.phone}));
      localStorage.setItem('l7_balance', String(data.wallet || 0));
      showToast('✅ Welcome back, '+data.username+'!','ok');
      setTimeout(function(){ location.href='index.html'; }, 1000);
    }).catch(function(e){
      showToast('Error: '+e.message,'err');
      btn.disabled=false; btn.textContent='LOGIN →';
    });
}

// Enter key
document.addEventListener('keydown', function(e){
  if(e.key!=='Enter') return;
  if(document.getElementById('form-login').style.display!=='none') doLogin();
  else doRegister();
});
</script>
</body>
